<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anniversary Tribute</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-heading">Happy Wedding Anniversary</div>

    <div class="frame-container">
        <div class="ken-burns-slider">
            <div class="slide active">
                <div class="image" style="background-image: url('path-to-wedding-photo.jpg');"></div>
                <div class="overlay"></div>
                <div class="content">
                    <h1>Where It All Began</h1>
                    <p>Establishing a foundation of love since 1999.</p>
                </div>
            </div>

            <div class="slide">
                <div class="image" style="background-image: url('path-to-travel-photo.jpg');"></div>
                <div class="overlay"></div>
                <div class="content">
                    <h1>Adventuring Together</h1>
                    <p>Exploring the world, one milestone at a time.</p>
                </div>
            </div>

            <div class="slide">
                <div class="image" style="background-image: url('path-to-recent-photo.jpg');"></div>
                <div class="overlay" style="background: rgba(0,0,0,0.3);"></div>
                <div class="content">
                    <h1>25 Years & Counting</h1>
                    <p>A legacy of happiness and family.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="floating-elements">
        <div class="float-item heart" style="left: 10%; animation-delay: 0s;">❤</div>
        <div class="float-item balloon" style="left: 20%; animation-delay: 2s;">🎈</div>
        <div class="float-item heart" style="left: 30%; animation-delay: 4s;">❤</div>
        <div class="float-item balloon" style="left: 70%; animation-delay: 1s;">🎈</div>
        <div class="float-item heart" style="left: 80%; animation-delay: 3s;">❤</div>
        <div class="float-item balloon" style="left: 90%; animation-delay: 5s;">🎈</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
